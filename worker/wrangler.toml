name = "cyber-fit-relay"
main = "src/index.mjs"
compatibility_date = "2026-06-01"

# Fires every 15 minutes; the client snaps reminder times to this grid.
[triggers]
crons = ["*/15 * * * *"]

[[kv_namespaces]]
binding = "SUBS"
# One-time setup: `wrangler kv namespace create SUBS`, paste the id here.
id = "REPLACE_WITH_KV_NAMESPACE_ID"

[vars]
# CORS: set to your Pages origin, e.g. "https://yourname.github.io"
ALLOWED_ORIGIN = "*"
ADMIN_CONTACT = "mailto:michael.bell1990@gmail.com"

# Secret (never in this file): wrangler secret put VAPID_PRIVATE_JWK
