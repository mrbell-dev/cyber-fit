# CI + deploy. Every push/PR runs test + build. Pushes to main also deploy the
# app and relay to Cloudflare Workers.
#
# Requires two repo secrets:
#   CLOUDFLARE_API_TOKEN   — "Edit Cloudflare Workers" token
#   CLOUDFLARE_ACCOUNT_ID  — 8786eafe23fbb3a55223d044f4efc0e9
# Relay runtime secrets (ACCESS_CODE, VAPID_PRIVATE_JWK) live in Cloudflare and
# are untouched by deploy.
name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build
      - run: cd worker && npm ci --omit=dev && node test.mjs

      - name: Deploy app
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy relay
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: cd worker && npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
