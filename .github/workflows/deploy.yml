# CI: test + build on every push. Hosting is Cloudflare Workers static assets
# (`npm run deploy`), not GitHub Pages.
#
# To let CI deploy too: create a Cloudflare API token (Workers Scripts: Edit),
# add repo secrets CLOUDFLARE_API_TOKEN + CLOUDFLARE_ACCOUNT_ID, and uncomment
# the deploy step.
name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build
      - run: cd worker && npm ci --omit=dev && node test.mjs

      # - name: Deploy to Cloudflare
