<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- cyber-fit icon: neon pulse line + lightning bolt on Electric City navy -->
  <defs>
    <linearGradient id="bolt" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff007a"/>
      <stop offset="1" stop-color="#a700ff"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="#1b1b2a"/>
  <rect x="16" y="16" width="480" height="480" rx="84" fill="none" stroke="#34344e" stroke-width="4"/>
  <!-- heartbeat pulse -->
  <path d="M48 300 H150 L186 300 210 220 250 366 292 260 312 300 H464"
        fill="none" stroke="#00ffb3" stroke-width="26" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M48 300 H150 L186 300 210 220 250 366 292 260 312 300 H464"
        fill="none" stroke="#00ffb3" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" opacity="0.5" transform="translate(0 -2)"/>
  <!-- lightning bolt -->
  <path d="M300 96 L212 232 H262 L226 330 L330 186 H276 L316 96 Z" fill="url(#bolt)"/>
</svg>
